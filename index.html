<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Výdaj obedov</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>🍽️ Výdaj obedov</h1>

    <p class="subtitle">
        Vyberte si obed na ďalší deň
    </p>


    <div class="menu">

        <button>Menu 1</button>

        <button>Menu 2</button>

        <button>Menu 3</button>

        <button>Menu 4</button>

    </div>


    <div class="quantity">

        <p>Počet obedov:</p>

        <button>-</button>

        <span>1</span>

        <button>+</button>

    </div>


    <button class="confirm">
        Objednať obed
    </button>


</div>


<script src="script.js"></script>

</body>
</html>
