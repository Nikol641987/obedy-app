<!DOCTYPE html>
<html lang="sk">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Obedy</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="login-wrapper">

    <div class="login-card">

        <img src="assets/TMV_A_modre.svg" class="logo" alt="TMV">

        <h1>Obedy</h1>

        <p class="subtitle">
            Interný objednávkový systém
        </p>


        <div class="mt-5">

            <label class="form-label">
                Zamestnanec
            </label>

            <select class="form-select" id="employeeSelect">

                <option>
                    Načítavam zamestnancov...
                </option>

            </select>

        </div>


        <div class="mt-4">

            <label class="form-label">
                PIN
            </label>

            <input
                type="password"
                id="pinInput"
                maxlength="4"
                class="form-control"
                placeholder="••••"
            >

        </div>


        <button 
            id="loginButton"
            class="btn btn-primary mt-5 w-100">

            Prihlásiť

        </button>


        <!-- MENU -->
        <div id="menuContainer" class="mt-4">

        </div>


    </div>

</div>


<script src="script.js"></script>

</body>
</html>
